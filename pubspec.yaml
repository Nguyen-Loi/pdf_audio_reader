name: pdf_audio_reader
description: "PDF Readcloud — reads PDFs aloud with karaoke word highlighting."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.3.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.5

  # PDF Parsing (MIT-licensed, free)

  # TTS & Audio
  flutter_tts: ^4.2.0
  audio_service: ^0.18.15
  audio_session: ^0.1.22
  google_mlkit_language_id: ^0.10.0

  # In-App Purchases (native)
  in_app_purchase: ^3.2.0

  # Utilities
  file_picker: ^8.1.4
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  uuid: ^4.5.1
  equatable: ^2.0.5
  fpdart: ^1.1.0
  intl: ^0.20.2
  flutter_hooks: ^0.20.5
  syncfusion_flutter_pdf: ^33.1.47
  syncfusion_flutter_pdfviewer: ^33.1.47
  syncfusion_flutter_core: ^33.1.47

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13
  mockito: ^5.4.4
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700